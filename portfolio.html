<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KayaMoz - Portfólio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui;
        }
        body {
            background: #F0F2F5;
            padding: 20px 16px 80px;
        }
        
        .app-header {
            background: linear-gradient(135deg, #1C1E21 0%, #FF9800 100%);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -16px 20px;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .logo {
            flex: 1;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .logo span {
            color: #FF9800;
            background: white;
            padding: 2px 8px;
            border-radius: 12px;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        h2 {
            color: #1C1E21;
            margin-bottom: 16px;
            border-left: 5px solid #FF9800;
            padding-left: 16px;
            font-size: 20px;
            text-align: left;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 14px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .bottom-nav-item {
            text-align: center;
            color: #888;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .bottom-nav-item.active {
            color: #FF9800;
            background: #FFF3E0;
        }
        
        .info {
            background: #E3F2FD;
            padding: 20px;
            border-radius: 24px;
            margin-top: 16px;
        }
        .info-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="app-header">
    <button class="back-btn" onclick="window.location.href='perfil.html'">←</button>
    <div class="logo">Kaya<span>Moz</span></div>
    <div style="width: 40px;"></div>
</div>

<div class="card">
    <h2>📸 Portfólio</h2>
    <div class="info">
        <div class="info-icon">📸</div>
        <h3>Funcionalidade em desenvolvimento</h3>
        <p style="margin-top:8px;">Em breve você poderá adicionar fotos do seu trabalho.</p>
    </div>
</div>

<div class="bottom-nav">
    <a href="page1.html" class="bottom-nav-item">🏠 Início</a>
    <a href="page2.html" class="bottom-nav-item">➕ Publicar</a>
    <a href="chat_list.html" class="bottom-nav-item">💬 Chat</a>
    <a href="mapa_trabalhos.html" class="bottom-nav-item">🗺️ Mapa</a>
    <a href="perfil.html" class="bottom-nav-item">👤 Perfil</a>
</div>

<script>
    const auth = firebase.auth();
    auth.onAuthStateChanged(user => { if(!user) window.location.href = "login.html"; });
</script>
</body>
</html>
