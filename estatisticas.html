<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KayaMoz - Estatísticas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #F0F2F5; padding: 20px 16px 80px; }
        header, nav:not(.bottom-nav), .tab-bar { display: none !important; }
        
        .app-header {
            background: linear-gradient(135deg, #1C1E21 0%, #FF9800 100%);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -16px 20px;
        }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { flex: 1; font-size: 18px; font-weight: 700; color: white; }
        .logo span { color: #FF9800; background: white; padding: 2px 8px; border-radius: 12px; }
        
        .card { background: white; border-radius: 32px; padding: 24px; margin-bottom: 20px; }
        h2 { color: #1C1E21; margin-bottom: 16px; border-left: 5px solid #FF9800; padding-left: 16px; font-size: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-box { background: #F8F9FA; padding: 16px; border-radius: 24px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 800; color: #FF9800; }
        .stat-label { font-size: 12px; color: #666; }
        canvas { max-height: 200px; margin: 20px 0; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 14px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .bottom-nav-item {
            text-align: center;
            color: #888;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .bottom-nav-item.active { color: #FF9800; background: #FFF3E0; }
    </style>
</head>
<body>

<div class="app-header">
    <button class="back-btn" onclick="window.location.href='perfil.html'">←</button>
    <div class="logo">Kaya<span>Moz</span></div>
    <div style="width: 40px;"></div>
</div>

<div class="card">
    <h2>📊 Minhas Estatísticas</h2>
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-number" id="totalVisualizacoes">0</div><div class="stat-label">Visualizações</div></div>
        <div class="stat-box"><div class="stat-number" id="totalContatos">0</div><div class="stat-label">Contatos</div></div>
        <div class="stat-box"><div class="stat-number" id="totalLikes">0</div><div class="stat-label">Likes</div></div>
        <div class="stat-box"><div class="stat-number" id="totalTrabalhos">0</div><div class="stat-label">Trabalhos</div></div>
    </div>
    <canvas id="viewsChart"></canvas>
    <canvas id="likesChart"></canvas>
</div>

<div class="bottom-nav">
    <a href="page1.html" class="bottom-nav-item">🏠 Início</a>
    <a href="page2.html" class="bottom-nav-item">➕ Publicar</a>
    <a href="chat_list.html" class="bottom-nav-item">💬 Chat</a>
    <a href="mapa_trabalhos.html" class="bottom-nav-item">🗺️ Mapa</a>
    <a href="perfil.html" class="bottom-nav-item">👤 Perfil</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh4SmNn05qmL32n89csKD9vQ67UyszQSA",
        authDomain: "kayamoz-53827.firebaseapp.com",
        databaseURL: "https://kayamoz-53827-default-rtdb.firebaseio.com",
        projectId: "kayamoz-53827",
        storageBucket: "kayamoz-53827.appspot.com",
        messagingSenderId: "1056589345224",
        appId: "1:1056589345224:web:e0f49f506e788c0399120e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    let currentUser = null;
    
    async function carregarEstatisticas() {
        const trabalhosSnap = await database.ref('trabalhos').orderByChild('autorId').equalTo(currentUser.uid).once('value');
        const trabalhos = trabalhosSnap.val() || {};
        const totalTrabalhos = Object.keys(trabalhos).length;
        document.getElementById('totalTrabalhos').innerText = totalTrabalhos;
        let totalLikes = 0;
        Object.values(trabalhos).forEach(t => { totalLikes += t.likes || 0; });
        document.getElementById('totalLikes').innerText = totalLikes;
        const statsSnap = await database.ref(`estatisticas/${currentUser.uid}`).once('value');
        const stats = statsSnap.val() || {};
        document.getElementById('totalVisualizacoes').innerText = stats.visualizacoes || 0;
        document.getElementById('totalContatos').innerText = stats.contatos || 0;
        const dias = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
        const viewsData = stats.viewsPorDia || [0,0,0,0,0,0,0];
        const likesData = stats.likesPorDia || [0,0,0,0,0,0,0];
        new Chart(document.getElementById('viewsChart'), { type: 'line', data: { labels: dias, datasets: [{ label: 'Visualizações', data: viewsData, borderColor: '#FF9800', fill: false }] } });
        new Chart(document.getElementById('likesChart'), { type: 'bar', data: { labels: dias, datasets: [{ label: 'Likes', data: likesData, backgroundColor: '#FF9800' }] } });
    }
    
    auth.onAuthStateChanged(user => { if(!user) window.location.href = "login.html"; else { currentUser = user; carregarEstatisticas(); } });
</script>
</body>
</html>
