<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KayaMoz - Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #F0F2F5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 32px 24px; max-width: 450px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .logo { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .logo span { color: #FF9800; }
        .slogan { text-align: center; color: #1C1E21; font-weight: 500; margin-bottom: 24px; font-size: 14px; }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; background: #F0F2F5; padding: 6px; border-radius: 48px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; color: #666; }
        .tab-btn.active { background: #FF9800; color: #1C1E21; }
        
        .form-container { display: none; }
        .form-container.active { display: block; }
        
        .input-group { margin-bottom: 18px; }
        label { font-size: 14px; font-weight: 600; color: #1C1E21; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 28px; font-size: 16px; background: #fff; }
        input:focus, select:focus { outline: none; border-color: #FF9800; }
        
        .checkbox-group { margin: 20px 0; display: flex; align-items: flex-start; gap: 12px; }
        .checkbox-group input { width: 20px; height: 20px; margin-top: 2px; }
        .checkbox-group label { font-size: 13px; font-weight: normal; color: #666; margin-bottom: 0; }
        
        .btn { background: #FF9800; color: #1C1E21; font-weight: bold; border: none; width: 100%; padding: 14px; border-radius: 40px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #FF9800; border: 1px solid #FF9800; margin-top: 12px; }
        .link { text-align: center; margin-top: 20px; }
        .link button { background: none; border: none; color: #FF9800; font-weight: 600; cursor: pointer; font-size: 14px; }
        
        .error-msg { background: #FFE5E5; color: #D32F2F; padding: 10px; border-radius: 28px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .success-msg { background: #E8F5E9; color: #2E7D32; padding: 10px; border-radius: 28px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .info-msg { background: #E3F2FD; color: #1565C0; padding: 10px; border-radius: 28px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .small-text { font-size: 12px; color: #999; margin-top: 4px; }
        .resend-link { background: none; border: none; color: #FF9800; cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 8px; display: block; width: 100%; text-align: center; }
        .visitante-btn { background: none; border: none; color: #FF9800; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 16px; display: block; width: 100%; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Kaya<span>Moz</span></div>
    <div class="slogan">Trabalho real. No teu bairro.</div>

    <div id="formError" class="error-msg" style="display: none;"></div>
    <div id="formSuccess" class="success-msg" style="display: none;"></div>
    <div id="formInfo" class="info-msg" style="display: none;"></div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="login">🔐 Entrar</button>
        <button class="tab-btn" data-tab="registro">📝 Criar Conta</button>
    </div>

    <!-- Login -->
    <div id="loginForm" class="form-container active">
        <div class="input-group">
            <label>👤 Nome de usuário ou E-mail</label>
            <input type="text" id="loginUsername" placeholder="Seu nome de usuário ou e-mail">
        </div>
        <div class="input-group">
            <label>🔒 Palavra-passe</label>
            <input type="password" id="loginPassword" placeholder="******">
        </div>
        <button class="btn" id="btnLogin">Entrar</button>
        <div class="link">
            <button id="btnRecuperar">🔐 Esqueceu a palavra-passe?</button>
        </div>
        <button id="btnVisitante" class="visitante-btn">👤 Entrar como Visitante</button>
    </div>

    <!-- Registo -->
    <div id="registroForm" class="form-container">
        <div class="input-group">
            <label>👤 Nome de usuário <span class="required">*</span></label>
            <input type="text" id="regUsername" placeholder="Ex: joaosilva">
            <div class="small-text">Use letras, números e underscore. Ex: joao_123</div>
        </div>
        <div class="row-2">
            <div class="input-group"><label>Nome completo</label><input type="text" id="regNome" placeholder="Ex: João Silva"></div>
            <div class="input-group"><label>Idade</label><input type="number" id="regIdade" placeholder="Ex: 25"></div>
        </div>
        <div class="row-2">
            <div class="input-group"><label>Bairro</label><input type="text" id="regBairro" placeholder="Ex: Malanga"></div>
            <div class="input-group">
                <label>Província</label>
                <select id="regProvincia">
                    <option>Maputo Cidade</option><option>Maputo Província</option><option>Gaza</option>
                    <option>Inhambane</option><option>Sofala</option><option>Manica</option><option>Tete</option>
                    <option>Zambézia</option><option>Nampula</option><option>Cabo Delgado</option><option>Niassa</option>
                </select>
            </div>
        </div>
        <div class="input-group"><label>📧 E-mail <span class="required">*</span></label><input type="email" id="regEmail" placeholder="seu@email.com"></div>
        <div class="input-group"><label>🔒 Palavra-passe <span class="required">*</span></label><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres"></div>
        <div class="input-group"><label>🔒 Confirmar palavra-passe</label><input type="password" id="regConfirmPassword" placeholder="Digite novamente"></div>
        <div class="input-group"><label>🎁 Código de indicação</label><input type="text" id="regCodigo" placeholder="Código de um amigo"></div>
        <div class="checkbox-group"><input type="checkbox" id="aceitaTermos"><label>Aceito os <a href="#" onclick="window.open('termos.html', '_blank')">Termos</a> e <a href="#" onclick="window.open('privacidade.html', '_blank')">Privacidade</a></label></div>
        <button class="btn" id="btnRegister">📝 Criar conta</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh4SmNn05qmL32n89csKD9vQ67UyszQSA",
        authDomain: "kayamoz-53827.firebaseapp.com",
        databaseURL: "https://kayamoz-53827-default-rtdb.firebaseio.com",
        projectId: "kayamoz-53827",
        storageBucket: "kayamoz-53827.appspot.com",
        messagingSenderId: "1056589345224",
        appId: "1:1056589345224:web:e0f49f506e788c0399120e"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    function showError(msg) { const div = document.getElementById('formError'); div.style.display = 'block'; div.innerText = msg; setTimeout(() => div.style.display = 'none', 5000); }
    function showSuccess(msg) { const div = document.getElementById('formSuccess'); div.style.display = 'block'; div.innerText = msg; setTimeout(() => div.style.display = 'none', 4000); }
    function showInfo(msg) { const div = document.getElementById('formInfo'); div.style.display = 'block'; div.innerText = msg; setTimeout(() => div.style.display = 'none', 4000); }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registroForm').classList.toggle('active', tab === 'registro');
        });
    });

    // LOGIN
    document.getElementById('btnLogin').onclick = async () => {
        const loginInput = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!loginInput || !password) { showError("Preencha os campos"); return; }

        let email = loginInput;
        if (!loginInput.includes('@')) {
            const usersSnap = await database.ref('users').orderByChild('username').equalTo(loginInput).once('value');
            const users = usersSnap.val();
            if (!users) { showError("Nome de usuário não encontrado"); return; }
            email = users[Object.keys(users)[0]].email;
        }

        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            if (!userCred.user.emailVerified) {
                const errorDiv = document.getElementById('formError');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = "⚠️ E-mail não confirmado!<br><button id='resendEmailBtn' class='resend-link'>📧 Reenviar e-mail</button>";
                document.getElementById('resendEmailBtn').onclick = async () => {
                    await userCred.user.sendEmailVerification();
                    showInfo("✅ E-mail reenviado!");
                    errorDiv.style.display = 'none';
                };
                await auth.signOut();
                return;
            }
            window.location.href = "page1.html";
        } catch (err) {
            if (err.code === 'auth/user-not-found') showError("Usuário não encontrado");
            else if (err.code === 'auth/wrong-password') showError("Palavra-passe incorreta");
            else showError("Erro: " + err.message);
        }
    };

    // Recuperar senha
    document.getElementById('btnRecuperar').onclick = () => {
        const loginInput = document.getElementById('loginUsername').value.trim();
        if (!loginInput) { showError("Digite seu e-mail ou nome de usuário"); return; }
        
        let email = loginInput;
        if (!loginInput.includes('@')) {
            database.ref('users').orderByChild('username').equalTo(loginInput).once('value', (snap) => {
                const users = snap.val();
                if (!users) { showError("Usuário não encontrado"); return; }
                email = users[Object.keys(users)[0]].email;
                auth.sendPasswordResetEmail(email).then(() => showSuccess("✅ Link enviado")).catch(err => showError("Erro: " + err.message));
            });
        } else {
            auth.sendPasswordResetEmail(email).then(() => showSuccess("✅ Link enviado")).catch(err => showError("Erro: " + err.message));
        }
    };

    // MODO VISITANTE
    document.getElementById('btnVisitante').onclick = () => {
        sessionStorage.setItem('modoVisitante', 'true');
        sessionStorage.setItem('visitanteId', 'visitante_' + Date.now());
        sessionStorage.setItem('visitanteNome', 'Visitante_' + Math.floor(Math.random() * 1000));
        window.location.href = "page1.html?modo=visitante";
    };

    // Registo
    document.getElementById('btnRegister').onclick = async () => {
        const username = document.getElementById('regUsername').value.trim().toLowerCase();
        const nome = document.getElementById('regNome').value.trim();
        const idade = document.getElementById('regIdade').value.trim();
        const bairro = document.getElementById('regBairro').value.trim();
        const provincia = document.getElementById('regProvincia').value;
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirm = document.getElementById('regConfirmPassword').value.trim();
        const aceitaTermos = document.getElementById('aceitaTermos').checked;

        if (!username || !/^[a-zA-Z0-9_]+$/.test(username)) { showError("Nome de usuário inválido"); return; }
        if (!nome || !idade || !bairro || !provincia || !email || !password) { showError("Preencha todos os campos"); return; }
        if (password.length < 6) { showError("Palavra-passe mínima 6 caracteres"); return; }
        if (password !== confirm) { showError("Palavras-passe não coincidem"); return; }
        if (!aceitaTermos) { showError("Aceite os Termos de Uso"); return; }

        const userSnap = await database.ref('users').orderByChild('username').equalTo(username).once('value');
        if (userSnap.exists()) { showError("Nome de usuário já existe"); return; }

        const btn = document.getElementById('btnRegister');
        btn.innerHTML = '⏳ Criando...';
        btn.disabled = true;

        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await userCred.user.sendEmailVerification();
            
            await database.ref('users/' + userCred.user.uid).set({
                username, nome, idade: parseInt(idade), bairro, provincia, email,
                telefone: "", whatsapp: "", genero: "", bio: "", fotoPerfil: null,
                verificado: false, perfilCompleto: 0, notificacoes: [], interesses: [], dataRegisto: Date.now()
            });
            
            showInfo("✅ Conta criada! Enviamos um link de confirmação para " + email);
            setTimeout(() => {
                document.querySelector('.tab-btn[data-tab="login"]').click();
                document.getElementById('loginUsername').value = username;
            }, 3000);
        } catch (err) {
            if (err.code === 'auth/email-already-in-use') showError("E-mail já registado");
            else showError("Erro: " + err.message);
        } finally { btn.innerHTML = '📝 Criar conta'; btn.disabled = false; }
    };
</script>
</body>
</html>
