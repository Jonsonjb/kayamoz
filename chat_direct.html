<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KayaMoz - Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #F0F2F5; height: 100vh; display: flex; flex-direction: column; }
        
        .header {
            background: linear-gradient(135deg, #1C1E21 0%, #FF9800 100%);
            padding: 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .header h2 { font-size: 18px; font-weight: 600; }
        .online-status { font-size: 11px; opacity: 0.8; }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message.sent {
            background: #FF9800;
            color: #1C1E21;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            background: white;
            color: #1C1E21;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        
        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
            background: #f8f8f8;
        }
        .input-area input:focus { outline: none; border-color: #FF9800; }
        .send-btn { background: #FF9800; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; color: #1C1E21; cursor: pointer; }
        
        .empty-chat { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='chat_list.html'">←</button>
    <div><h2 id="chatNome">Carregando...</h2><div class="online-status" id="onlineStatus">Online</div></div>
</div>

<div class="messages-container" id="messagesContainer">
    <div class="empty-chat">💬 Nenhuma mensagem ainda.<br>Envie uma mensagem para iniciar a conversa!</div>
</div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
    <button class="send-btn" id="sendBtn">Enviar</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh4SmNn05qmL32n89csKD9vQ67UyszQSA",
        authDomain: "kayamoz-53827.firebaseapp.com",
        databaseURL: "https://kayamoz-53827-default-rtdb.firebaseio.com",
        projectId: "kayamoz-53827",
        storageBucket: "kayamoz-53827.appspot.com",
        messagingSenderId: "1056589345224",
        appId: "1:1056589345224:web:e0f49f506e788c0399120e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    let currentUser = null;
    let outroUserId = null;
    let outroNome = "";
    
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        outroUserId = params.get('userId');
        outroNome = params.get('nome') || "Usuário";
        document.getElementById('chatNome').innerText = outroNome;
    }
    
    function scrollToBottom() { const container = document.getElementById('messagesContainer'); container.scrollTop = container.scrollHeight; }
    
    function marcarComoLidas() { if (!currentUser || !outroUserId) return; database.ref(`chats/${currentUser.uid}/${outroUserId}`).update({ naoLidas: 0 }); }
    
    function enviarMensagem() {
        const input = document.getElementById('messageInput');
        const texto = input.value.trim();
        if (!texto) return;
        const timestamp = Date.now();
        const messageId = database.ref(`mensagens/${currentUser.uid}_${outroUserId}`).push().key;
        const mensagem = { id: messageId, texto: texto, remetenteId: currentUser.uid, destinatarioId: outroUserId, timestamp: timestamp, lida: false };
        database.ref(`mensagens/${currentUser.uid}_${outroUserId}/${messageId}`).set(mensagem);
        database.ref(`mensagens/${outroUserId}_${currentUser.uid}/${messageId}`).set(mensagem);
        const chatData = { ultimaMsg: { texto: texto, timestamp: timestamp }, outroNome: outroNome, outroId: outroUserId, timestamp: timestamp };
        database.ref(`chats/${currentUser.uid}/${outroUserId}`).update(chatData);
        database.ref(`chats/${outroUserId}/${currentUser.uid}/naoLidas`).transaction((current) => (current || 0) + 1);
        database.ref(`chats/${outroUserId}/${currentUser.uid}`).update({ ultimaMsg: { texto: texto, timestamp: timestamp }, outroNome: currentUser.displayName || currentUser.email?.split('@')[0] || "Usuário", outroId: currentUser.uid, timestamp: timestamp });
        input.value = '';
        scrollToBottom();
    }
    
    function carregarMensagens() {
        const container = document.getElementById('messagesContainer');
        const chatId = `${currentUser.uid}_${outroUserId}`;
        database.ref(`mensagens/${chatId}`).orderByChild('timestamp').on('value', (snap) => {
            const mensagens = snap.val();
            if (!mensagens) { container.innerHTML = '<div class="empty-chat">💬 Nenhuma mensagem ainda.<br>Envie uma mensagem para iniciar a conversa!</div>'; return; }
            let html = '';
            Object.keys(mensagens).forEach(key => {
                const msg = mensagens[key];
                const isSent = msg.remetenteId === currentUser.uid;
                const time = new Date(msg.timestamp).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                html += `<div class="message ${isSent ? 'sent' : 'received'}">${escapeHtml(msg.texto)}<div class="message-time">${time}</div></div>`;
            });
            container.innerHTML = html;
            scrollToBottom();
            marcarComoLidas();
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    document.getElementById('sendBtn').onclick = enviarMensagem;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });
    
    auth.onAuthStateChanged(user => {
        if (!user) window.location.href = "login.html";
        else { currentUser = user; getUrlParams(); carregarMensagens(); }
    });
</script>
</body>
</html>
