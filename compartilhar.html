<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KayaMoz - Compartilhar</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #F0F2F5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .app-header {
            background: linear-gradient(135deg, #1C1E21 0%, #FF9800 100%);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { flex: 1; font-size: 18px; font-weight: 700; color: white; }
        .logo span { color: #FF9800; background: white; padding: 2px 8px; border-radius: 12px; }
        
        .card { background: white; border-radius: 32px; padding: 32px; max-width: 400px; width: 100%; text-align: center; margin-top: 80px; }
        .logo-icon { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #1C1E21; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; }
        .btn { background: #FF9800; border: none; padding: 14px; border-radius: 40px; font-weight: bold; width: 100%; margin-top: 12px; cursor: pointer; }
        .share-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .share-btn { flex: 1; background: #F0F2F5; border: none; padding: 12px; border-radius: 40px; cursor: pointer; font-size: 20px; }
        
        .toast { position: fixed; bottom: 80px; left: 16px; right: 16px; background: #1C1E21; color: white; padding: 12px; border-radius: 50px; text-align: center; z-index: 200; }
    </style>
</head>
<body>

<div class="app-header">
    <button class="back-btn" onclick="window.location.href='perfil.html'">←</button>
    <div class="logo">Kaya<span>Moz</span></div>
    <div style="width: 40px;"></div>
</div>

<div class="card">
    <div class="logo-icon">📱</div>
    <h2>Compartilhe o KayaMoz</h2>
    <p>Ajude mais pessoas a encontrarem trabalho real no seu bairro!</p>
    <button class="btn" id="shareWhatsApp">📱 Compartilhar no WhatsApp</button>
    <button class="btn" id="shareGeneral">📤 Compartilhar com amigos</button>
    <div class="share-buttons"><button class="share-btn" id="copyLink">📋 Copiar Link</button></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh4SmNn05qmL32n89csKD9vQ67UyszQSA",
        authDomain: "kayamoz-53827.firebaseapp.com",
        databaseURL: "https://kayamoz-53827-default-rtdb.firebaseio.com",
        projectId: "kayamoz-53827",
        storageBucket: "kayamoz-53827.appspot.com",
        messagingSenderId: "1056589345224",
        appId: "1:1056589345224:web:e0f49f506e788c0399120e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // NOVO LINK DE DOWNLOAD DO APK
    const appLink = "https://jonsonjb.github.io/kayamoz/";
    const shareText = `📢 KayaMoz - Trabalho real no seu bairro!\n\nEncontre e contrate profissionais perto de você.\n\n📱 Baixe o App: ${appLink}`;
    
    function showToast(msg) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    
    document.getElementById('shareWhatsApp').onclick = () => { window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank'); };
    document.getElementById('shareGeneral').onclick = () => { if(navigator.share) navigator.share({title: 'KayaMoz', text: shareText}); else showToast("Clique em copiar link e cole onde quiser."); };
    document.getElementById('copyLink').onclick = () => { navigator.clipboard.writeText(shareText); showToast("✅ Link copiado! Cole onde quiser."); };
    
    auth.onAuthStateChanged(user => { if(!user) window.location.href = "login.html"; });
</script>
</body>
</html>
